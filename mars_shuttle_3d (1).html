    // ============ GAME FLOW ============

    function startGame() {
      document.getElementById('intro').style.display = 'none';
      initState(true);
      createCargoMeshes();
      updateUI();
      Sound.playAmbience();
      showHint('👆 Нажми на ящик чтобы загрузить');
    }

    function openBayModal(i) {
      const bay = state.cargoBays[i];
      if (bay.loaded) return;
      const res = RESOURCES[bay.resource];
      const have = state.inventory[bay.resource] || 0;
      const hasEnough = have >= bay.amount;

      const stockHtml = hasEnough
        ? `На складе: <span class="have">${have} / ${bay.amount}</span> ✓`
        : `На складе: <span class="lack">${have} / ${bay.amount}</span> · не хватает ${bay.amount - have}`;

      let actionsHtml;
      if (hasEnough) {
        actionsHtml = `
      <button class="btn btn-primary" onclick="loadBay(${i})">Загрузить в шаттл</button>
      <button class="btn btn-ghost" onclick="hideModal()">Отмена</button>
    `;
      } else {
        const lacking = bay.amount - have;
        const cost = res.price * lacking;
        actionsHtml = `
      <button class="btn btn-credit" onclick="buyAndLoad(${i}, ${cost})">
        💎 Купить ×${lacking} за ${cost}
      </button>
      <button class="btn btn-secondary" onclick="produceResource(${i})">
        🏭 Произвести на ферме
      </button>
      <button class="btn btn-ghost" onclick="hideModal()">Закрыть</button>
    `;
      }

      showModal(`
    <div class="modal-title">Отсек ${i + 1}</div>
    <div class="modal-subtitle">Груз для отправки на станцию «Гермес»</div>
    <div class="resource-row">
      <div class="r-icon">${res.icon}</div>
      <div class="r-info">
        <div class="r-name">${res.name} × ${bay.amount}</div>
        <div class="r-stock">${stockHtml}</div>
      </div>
    </div>
    ${actionsHtml}
  `);
    }

    window.loadBay = function (i) {
      const bay = state.cargoBays[i];
      state.inventory[bay.resource] -= bay.amount;
      bay.loaded = true;
      hideModal();
      animateCargoToRocket(i);
    };

    window.buyAndLoad = function (i, cost) {
      if (state.credits < cost) { toast('Недостаточно кредитов'); return; }
      const bay = state.cargoBays[i];
      state.credits -= cost;
      state.inventory[bay.resource] = 0;
      bay.loaded = true;
      hideModal();
      toast(`Куплено за ${cost} 💎`);
      animateCargoToRocket(i);
    };

    window.produceResource = function (i) {
      hideModal();
      const bay = state.cargoBays[i];
      const need = bay.amount - (state.inventory[bay.resource] || 0);
      const resName = RESOURCES[bay.resource].name;
      let pct = 0;
      showStatusBar('🏭', `Производство: ${resName} ×${need}`, 0);
      const interval = setInterval(() => {
        pct += 12;
        showStatusBar('🏭', `Производство: ${resName} ×${need}`, Math.min(pct, 100));
        if (pct >= 100) {
          clearInterval(interval);
          state.inventory[bay.resource] += need;
          clearStatusBar();
          toast(`Произведено: ${resName} ×${need}`);
        }
      }, 200);
    };

    function animateCargoToRocket(i) {
      const mesh = cargoMeshes[i];
      const start = { x: mesh.position.x, y: mesh.position.y, z: mesh.position.z };
      const end = {
        x: Math.cos(-Math.PI / 2 + (i - 1) * 0.7) * 0.68,
        y: 1.5,
        z: Math.sin(-Math.PI / 2 + (i - 1) * 0.7) * 0.68
      };
      const startTime = performance.now();
      const duration = 900;
      const arcHeight = 2.5;

      function step() {
        const t = Math.min(1, (performance.now() - startTime) / duration);
        const ease = 1 - Math.pow(1 - t, 3);
        mesh.position.x = start.x + (end.x - start.x) * ease;
        mesh.position.z = start.z + (end.z - start.z) * ease;
        mesh.position.y = start.y + (end.y - start.y) * ease + Math.sin(t * Math.PI) * arcHeight;
        mesh.scale.setScalar(1 - ease * 0.6);
        mesh.rotation.y += 0.2;
        mesh.rotation.x += 0.15;
        if (t < 1) requestAnimationFrame(step);
        else {
          mesh.visible = false;
          spawnLoadParticles(new THREE.Vector3(end.x, end.y, end.z), RESOURCES[state.cargoBays[i].resource].color);
          CameraShake.shake(0.15);
          const panel = bayPanels[i];
          const res = RESOURCES[state.cargoBays[i].resource];
          panel.material.color.set(0x00FF87);
          panel.material.emissive = new THREE.Color(0x00aa44);
          panel.material.emissiveIntensity = 0.8;
          toast(`${res.name} в шаттле ✓`);
          updateUI();
        }
      }
      step();
    }

    // ============ PRE-LAUNCH OBSTACLES ============

    function startPreLaunch() {
      state.phase = 'balance';
      cameraAuto = false;
      showBalance();
    }

    function showBalance() {
      try {
        let devX = -35;
        let devY = 40;
        let targetX = -35;
        let targetY = 40;
        let baseGamma = null;
        let baseBeta = null;
        let orientationHandler = null;
        let animId = null;
        let synth = null;

        Sound.init();
        if (Sound.ctx) {
          const osc = Sound.ctx.createOscillator();
          const gain = Sound.ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(300, Sound.ctx.currentTime);
          gain.gain.setValueAtTime(0.001, Sound.ctx.currentTime);
          osc.connect(gain);
          gain.connect(Sound.ctx.destination);
          osc.start();
          synth = { osc, gain };
        }

        function updateLoop() {
          devX += (targetX - devX) * 0.08;
          devY += (targetY - devY) * 0.08;

          targetX += Math.sin(performance.now() * 0.0015) * 0.15;
          targetY += Math.cos(performance.now() * 0.0012) * 0.15;

          const maxRadius = 65;
          const dist = Math.sqrt(devX * devX + devY * devY);
          if (dist > maxRadius) {
            const angle = Math.atan2(devY, devX);
            devX = Math.cos(angle) * maxRadius;
            devY = Math.sin(angle) * maxRadius;
          }

          const ind = document.getElementById('radarInd');
          if (ind) {
            ind.style.transform = `translate(calc(-50% + ${devX}px), calc(-50% + ${devY}px))`;
          }

          if (rocketGroup) {
            rocketGroup.rotation.z = -devX * 0.004;
            rocketGroup.rotation.x = devY * 0.004;
          }

          const alignedDist = 18;
          const inZone = dist < alignedDist;
          const lockBtn = document.getElementById('lockBtn');
          const pct = Math.max(0, Math.min(100, Math.round(100 - (dist / maxRadius) * 100)));

          const pctDisplay = document.getElementById('radarPct');
          if (pctDisplay) {
            pctDisplay.textContent = inZone ? `ПОДКЛЮЧЕНО: ${pct}% (СТАБИЛЬНО)` : `СИНХРОНИЗАЦИЯ: ${pct}%`;
            pctDisplay.style.color = inZone ? '#00FF87' : '#00E5FF';
          }

          if (lockBtn) {
            lockBtn.disabled = !inZone;
            lockBtn.className = 'btn ' + (inZone ? 'btn-primary' : 'btn-ghost');
            lockBtn.textContent = inZone ? '✓ Синхронизировать вектор' : 'Синхронизировать (вне осей)';
          }

          if (ind) {
            ind.style.background = inZone ? '#00FF87' : 'white';
            ind.style.boxShadow = inZone ? '0 0 20px #00FF87' : '0 0 12px white';
          }

          if (synth) {
            const targetFreq = inZone ? 580 : (300 + pct * 2.2);
            const targetVol = inZone ? 0.08 : 0.03 + (pct / 100) * 0.03;
            synth.osc.frequency.setTargetAtTime(targetFreq, Sound.ctx.currentTime, 0.08);
            synth.gain.gain.setTargetAtTime(targetVol, Sound.ctx.currentTime, 0.08);
          }

          animId = requestAnimationFrame(updateLoop);
        }

        function onOrientation(e) {
          const gamma = e.gamma;
          const beta = e.beta;
          if (gamma === null || beta === null) return;

          if (baseGamma === null) {
            baseGamma = gamma;
            baseBeta = beta;
          }

          const tiltX = gamma - baseGamma;
          const tiltY = beta - baseBeta;

          const maxTilt = 15;
          targetX = (tiltX / maxTilt) * 60;
          targetY = (tiltY / maxTilt) * 60;

          targetX = Math.max(-65, Math.min(65, targetX));
          targetY = Math.max(-65, Math.min(65, targetY));
        }

        function stopGyro() {
          if (orientationHandler) {
            window.removeEventListener('deviceorientation', orientationHandler, true);
            orientationHandler = null;
          }
          if (animId) {
            cancelAnimationFrame(animId);
            animId = null;
          }
          if (synth) {
            try {
              synth.osc.stop();
            } catch (e) { }
            synth = null;
          }
          if (rocketGroup) {
            rocketGroup.rotation.set(0, 0, 0);
          }
        }

        function activateGyro() {
          orientationHandler = onOrientation;
          window.addEventListener('deviceorientation', onOrientation, true);
          baseGamma = null;
          baseBeta = null;
          const btn = document.getElementById('gyroActivateBtn');
          const badge = document.getElementById('gyroBadge');
          if (btn) btn.style.display = 'none';
          if (badge) badge.style.display = 'block';
          toast('📱 Наклоняй телефон для калибровки осей!');
        }

        window._enableGyro = async function () {
          try {
            const DOE = window.DeviceOrientationEvent;
            if (DOE && typeof DOE.requestPermission === 'function') {
              const perm = await DOE.requestPermission();
              if (perm === 'granted') activateGyro();
              else toast('Доступ отклонён — используй кнопки');
            } else {
              activateGyro();
            }
          } catch (err) {
            toast('Ошибка: ' + err.message);
          }
        };

        window._nudge = function (dx, dy) {
          targetX += dx * 18;
          targetY += dy * 18;
          targetX = Math.max(-65, Math.min(65, targetX));
          targetY = Math.max(-65, Math.min(65, targetY));
        };

        window._balanceDone = function () {
          stopGyro();
          hideModal();
          Sound.playSuccess();
          toast('📡 Навигация откалибрована!');
          setTimeout(showFuel, 400);
        };

        animId = requestAnimationFrame(updateLoop);

        showModal(`
    <div class="modal-title">📡 Настройка навигации</div>
    <div class="modal-subtitle">Совместите перекрестие телеметрии с орбитальным вектором маяка «Гермес»</div>
    
    <div class="radar-container">
      <div class="radar-grid"></div>
      <div class="radar-sweep"></div>
      <div class="radar-target"></div>
      <div class="radar-indicator" id="radarInd"></div>
    </div>
    <div class="radar-hud-info" id="radarPct">СИНХРОНИЗАЦИЯ: 0%</div>
    
    <div id="gyroBadge" class="gyro-badge" style="display:none; text-align:center; margin: 8px auto 12px; width: fit-content;">📱 Гироскоп: Наклоняйте телефон</div>
    <button id="gyroActivateBtn" class="btn btn-secondary" onclick="window._enableGyro()" style="margin-bottom:10px; margin-top:12px;">📱 Активировать гироскоп</button>
    
    <div class="balance-controls" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; max-width: 200px; margin: 10px auto;">
      <div></div>
      <button class="btn btn-secondary" style="padding: 10px;" onclick="window._nudge(0, -1)">▲</button>
      <div></div>
      <button class="btn btn-secondary" style="padding: 10px;" onclick="window._nudge(-1, 0)">◀</button>
      <div style="display:flex; align-items:center; justify-content:center; font-size:10px; color:rgba(255,255,255,0.4);">РУЧНОЙ</div>
      <button class="btn btn-secondary" style="padding: 10px;" onclick="window._nudge(1, 0)">▶</button>
      <div></div>
      <button class="btn btn-secondary" style="padding: 10px;" onclick="window._nudge(0, 1)">▼</button>
      <div></div>
    </div>
    
    <button class="btn btn-ghost" id="lockBtn" disabled onclick="window._balanceDone()">Синхронизировать (вне осей)</button>
  `);
      } catch (err) {
        toast('❌ Баланс: ' + err.message);
        console.error('showBalance error:', err);
      }
    }

    function showFuel() {
      state.phase = 'fuel';

      let currentFuel = state.fuel;
      let targetSectorStart = 144;
      let targetSectorWidth = 72;
      let needleAngle = 0;
      let animId = null;
      let speed = 4.5;

      function updateReactorLoop() {
        needleAngle = (needleAngle + speed) % 360;
        const needle = document.getElementById('reactorNeedle');
        if (needle) {
          needle.style.transform = `translateX(-50%) rotate(${needleAngle}deg)`;
        }
        animId = requestAnimationFrame(updateReactorLoop);
      }

      window._stabilizeCore = function () {
        const end = (targetSectorStart + targetSectorWidth) % 360;
        let success = false;
        if (targetSectorStart < end) {
          success = needleAngle >= targetSectorStart && needleAngle <= end;
        } else {
          success = needleAngle >= targetSectorStart || needleAngle <= end;
        }

        if (success) {
          currentFuel++;
          Sound.playCoilSuccess();
          CameraShake.shake(0.12);
          toast('⚛️ Контур стабилизирован!');
          renderCanisters();

          if (currentFuel >= state.fuelNeeded) {
            cancelAnimationFrame(animId);
            state.fuel = state.fuelNeeded;
            hideModal();
            Sound.playSuccess();
            toast('⚛️ Реактор стабилен!');
            setTimeout(showStorm, 500);
          } else {
            targetSectorStart = Math.floor(Math.random() * 280);
            const sectorEl = document.getElementById('reactorSector');
            const lineEl = document.getElementById('reactorLine');
            if (sectorEl && lineEl) {
              sectorEl.style.background = `conic-gradient(from ${targetSectorStart}deg, transparent 0deg, rgba(0, 255, 135, 0.25) 0deg, rgba(0, 255, 135, 0.25) ${targetSectorWidth}deg, transparent ${targetSectorWidth}deg)`;
              lineEl.style.transform = `translateX(-50%) rotate(${(targetSectorStart + targetSectorWidth / 2)}deg)`;
            }
          }
        } else {
          Sound.playError();
          CameraShake.shake(0.35);
          toast('⚠️ Нестабильность! Промах.');

          const core = document.getElementById('reactorCore');
          if (core) {
            core.style.borderColor = '#FF2E93';
            core.style.boxShadow = '0 0 40px rgba(255, 46, 147, 0.6)';
            setTimeout(() => {
              core.style.borderColor = '';
              core.style.boxShadow = '';
            }, 300);
          }
        }
      };

      function renderCanisters() {
        const canisters = document.getElementById('reactorCanisters');
        const txt = document.getElementById('reactorCountTxt');
        if (canisters && txt) {
          canisters.innerHTML = Array.from({ length: state.fuelNeeded }, (_, i) =>
            `<div class="canister ${i < currentFuel ? 'full' : ''}">⚛️</div>`
          ).join('');
          txt.textContent = `Стабильно контуров: ${currentFuel} / ${state.fuelNeeded}`;
        }
      }

      window._buyFuel = function () {
        if (state.credits < 120) { toast('Недостаточно кредитов'); return; }
        cancelAnimationFrame(animId);
        state.credits -= 120;
        state.fuel = state.fuelNeeded;
        hideModal();
        updateUI();
        Sound.playSuccess();
        toast('Реактор запущен');
        setTimeout(showStorm, 500);
      };

      animId = requestAnimationFrame(updateReactorLoop);

      showModal(`
    <div class="modal-title">⚛️ Стабилизация реактора</div>
    <div class="modal-subtitle">Синхронизируйте импульс накачки, когда стрелка находится в зеленом секторе стабильности</div>
    
    <div class="reactor-container" id="reactorCore">
      <div class="reactor-target-sector" id="reactorSector" style="background: conic-gradient(from ${targetSectorStart}deg, transparent 0deg, rgba(0, 255, 135, 0.25) 0deg, rgba(0, 255, 135, 0.25) ${targetSectorWidth}deg, transparent ${targetSectorWidth}deg);"></div>
      <div class="reactor-target-line" id="reactorLine" style="transform: translateX(-50%) rotate(${(targetSectorStart + targetSectorWidth / 2)}deg);"></div>
      <div class="reactor-needle" id="reactorNeedle"></div>
      <div class="reactor-center"></div>
    </div>
    
    <div id="reactorCanisters" class="canisters">
      ${Array.from({ length: state.fuelNeeded }, (_, i) =>
        `<div class="canister ${i < currentFuel ? 'full' : ''}">⚛️</div>`
      ).join('')}
    </div>
    <div class="center-text" id="reactorCountTxt">Стабильно контуров: <b>${currentFuel} / ${state.fuelNeeded}</b></div>
    
    <button class="btn btn-primary" onclick="window._stabilizeCore()">⚡ СТАБИЛИЗИРОВАТЬ КОНТУР</button>
    <button class="btn btn-credit" onclick="window._buyFuel()">💎 Купить ячейки плазмы за 120</button>
  `);
    }

    function spawnCSSSparks(x, y, color = '#b450ff') {
      const count = 12;
      const colors = [color, '#58c8fa', '#ffffff'];
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'spark-particle';
        p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        p.style.left = x + 'px';
        p.style.top = y + 'px';

        const angle = Math.random() * Math.PI * 2;
        const distance = 40 + Math.random() * 80;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance;
        const rot = Math.random() * 360;

        p.style.setProperty('--tx', tx + 'px');
        p.style.setProperty('--ty', ty + 'px');
        p.style.setProperty('--rot', rot + 'deg');

        document.body.appendChild(p);
        setTimeout(() => p.remove(), 600);
      }
    }

    function showStorm() {
      state.phase = 'storm';
      let seconds = state.stormSeconds;

      window._handleStormTap = function (event) {
        if (event) event.preventDefault();

        let x = window.innerWidth / 2;
        let y = window.innerHeight / 2 - 100;
        if (event) {
          if (event.clientX !== undefined) {
            x = event.clientX;
            y = event.clientY;
          } else if (event.touches && event.touches[0]) {
            x = event.touches[0].clientX;
            y = event.touches[0].clientY;
          }
        }

        seconds -= 0.5;
        if (seconds < 0) seconds = 0;

        const shield = document.getElementById('shieldOverlay');
        if (shield) {
          shield.classList.add('hit');
          setTimeout(() => shield.classList.remove('hit'), 120);
        }

        CameraShake.shake(0.08);
        spawnStormArc();
        spawnCSSSparks(x, y, '#b450ff');

        const tornado = document.getElementById('stormTornado');
        if (tornado) {
          tornado.style.transform = 'scale(0.8) rotate(' + (Math.random() * 30 - 15) + 'deg)';
          setTimeout(() => {
            tornado.style.transform = '';
          }, 70);

          const wrap = tornado.parentElement;
          const rect = wrap.getBoundingClientRect();
          const relativeX = event ? (x - rect.left) : (rect.width / 2);
          const relativeY = event ? (y - rect.top) : (rect.height / 2);

          const floatText = document.createElement('div');
          floatText.className = 'tap-effect';
          floatText.style.left = relativeX + 'px';
          floatText.style.top = relativeY + 'px';
          floatText.textContent = '-0.5с';
          wrap.appendChild(floatText);

          setTimeout(() => { floatText.remove(); }, 500);
        }

        const min = Math.floor(seconds / 60);
        const sec = String(Math.floor(seconds) % 60).padStart(2, '0');
        const display = document.getElementById('stormTimerDisplay');
        if (display) display.textContent = `${min}:${sec}`;

        if (seconds <= 0) {
          clearInterval(window._stormInt);
          finishStorm();
        }
      };

      const render = () => {
        const min = Math.floor(seconds / 60);
        const sec = String(Math.floor(seconds) % 60).padStart(2, '0');
        showModal(`
      <style>
        .storm-tapper {
          cursor: pointer;
          user-select: none;
          -webkit-user-select: none;
          -webkit-tap-highlight-color: transparent;
        }
        .tap-effect {
          position: absolute;
          font-weight: 800;
          font-size: 22px;
          color: #58c8fa;
          text-shadow: 0 0 10px rgba(88,200,250,0.8);
          pointer-events: none;
          z-index: 100;
          animation: floatUpFade 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }
        @keyframes floatUpFade {
          0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5) translateY(0); }
          20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
          100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9) translateY(-50px); }
        }
      </style>
      <div class="modal-title">⚡ Геомагнитный шторм</div>
      <div class="modal-subtitle">ЭМИ-помехи блокируют запуск. Сбросьте статический заряд!</div>
      
      <div class="storm-tap-area" style="position: relative; margin: 15px auto 5px; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center;">
        <div class="obstacle-visual bob storm-tapper" id="stormTornado" onpointerdown="window._handleStormTap(event)" style="font-size: 75px; margin: 0; transition: transform 0.08s ease;">🌀</div>
      </div>
      
      <div style="font-size: 13px; color: #a4b0be; margin-bottom: 12px; font-weight: 500; line-height: 1.4; text-align:center;">
        👉 Тапайте по аномалии, чтобы разрядить щит!<br>
        <b style="color: #00FF87;">-0.5 сек</b> за каждый тап!
      </div>
      
      <div class="timer-display" id="stormTimerDisplay">${min}:${sec}</div>
      <button class="btn btn-credit" onclick="window._skipStorm()">💎 Запустить ЭМИ-абсорбер — 45</button>
      <button class="btn btn-ghost" disabled>Ожидание...</button>
    `);
      };

      render();

      window._stormInt = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
          clearInterval(window._stormInt);
          finishStorm();
        } else {
          const min = Math.floor(seconds / 60);
          const sec = String(Math.floor(seconds) % 60).padStart(2, '0');
          const display = document.getElementById('stormTimerDisplay');
          if (display) display.textContent = `${min}:${sec}`;
        }
      }, 1000);
    }

    window._skipStorm = function () {
      if (state.credits < 45) { toast('Недостаточно кредитов'); return; }
      state.credits -= 45;
      clearInterval(window._stormInt);
      toast('ЭМИ-абсорбер поглотил шторм');
      finishStorm();
    };

    function finishStorm() {
      hideModal();
      updateUI();
      setTimeout(launchShuttle, 500);
    }

    // ============ LAUNCH ============

    function launchShuttle() {
      state.phase = 'launchAnim';
      launchTime = 0;
      Sound.playLaunchRumble();
      toast('🚀 ЗАПУСК!');
      showHint('Шаттл стартует...', 4000);
    }

    function startFlightTimer() {
      let seconds = state.flightSeconds;
      showStatusBar('🛰️', `Шаттл в пути → Гермес · ${seconds}с`, 0);
      const interval = setInterval(() => {
        seconds--;
        const pct = ((state.flightSeconds - seconds) / state.flightSeconds) * 100;
        showStatusBar('🛰️', `Шаттл в пути → Гермес · ${Math.max(0, seconds)}с`, pct);
        if (seconds <= 0) {
          clearInterval(interval);
          clearStatusBar();
          state.phase = 'returnAnim';
          returnTime = 0;
          toast('Шаттл возвращается!');
        }
      }, 1000);
    }

    function showClaimModal() {
      const rewards = [...REWARD_POOL].sort(() => Math.random() - 0.5).slice(0, 3).map(r => ({
        ...r, amount: Math.ceil(Math.random() * 3) + 1
      }));
      state.pendingRewards = rewards;
      const items = rewards.map(r => `
    <div class="reward-item">
      <div class="reward-icon">${r.icon}</div>
      <div class="reward-amount">×${r.amount}</div>
      <div class="reward-name">${r.name}</div>
    </div>
  `).join('');
      showModal(`
    <div class="modal-title" style="text-align:center;">🎁 Груз доставлен!</div>
    <div class="modal-subtitle" style="text-align:center;">Станция «Гермес» прислала груз. +80 💎 от сделки.</div>
    <div class="reward-grid">${items}</div>
    <button class="btn btn-primary" onclick="window._claim()">Забрать груз</button>
  `);
    }

    window._claim = function () {
      state.buildProgress = Math.min(state.buildTarget, state.buildProgress + 1);
      state.credits += 80;
      hideModal();

      // Reset bay panels
      bayPanels.forEach(p => {
        p.material.color.set(0x333333);
        p.material.emissive = new THREE.Color(0x000000);
      });

      if (state.buildProgress >= state.buildTarget) {
        setTimeout(showBuildComplete, 400);
      } else {
        setTimeout(() => {
          state.phase = 'loading';
          state.cargoBays = generateBays(false);
          state.fuel = Math.floor(Math.random() * 2);
          state.fuelNeeded = 3;
          state.stormSeconds = 8 + Math.floor(Math.random() * 6);
          Object.keys(state.inventory).forEach(k => {
            state.inventory[k] += Math.floor(Math.random() * 3);
          });
          createCargoMeshes();
          cargoMeshes.forEach(m => { m.visible = true; m.scale.setScalar(1); });
          cameraAuto = true;
          updateUI();
          toast('🚀 Новый шаттл прибыл');
          showHint('Загрузи 3 отсека для нового запуска');
        }, 600);
      }
    };

    function showBuildComplete() {
      showModal(`
    <div class="modal-title" style="text-align:center;">🏛️ Купол «Гелиос» построен!</div>
    <div class="obstacle-visual" style="font-size:80px;">🎉</div>
    <div class="modal-subtitle" style="text-align:center;">
      Колония расширяется. Исследовательский центр открыт.
    </div>
    <button class="btn btn-primary" onclick="window._restart()">Начать новый цикл</button>
  `);
    }

    window._restart = function () {
      hideModal();
      document.getElementById('intro').style.display = 'block';
    };

    // ============ INIT ============

    updateCamera();
    animate();

    // Hide loading
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loading').style.opacity = '0';
        document.getElementById('loading').style.transition = 'opacity 0.5s';
        setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
      }, 600);
    });

    // Make startGame globally accessible
    window.startGame = startGame;
  </script>
</body>

</html>
