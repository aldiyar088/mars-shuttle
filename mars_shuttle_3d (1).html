<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Шаттл «Арес-7» — 3D Прототип</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #06020c;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #F5F0E8;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      z-index: 0;
    }

    #canvas-container canvas {
      display: block;
      touch-action: none;
    }

    /* UI Overlay */
    .ui-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .ui-overlay>* {
      pointer-events: auto;
    }

    /* Top HUD */
    .hud-top {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .hud-card {
      background: rgba(14, 8, 28, 0.72);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 12px 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .colony-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #00E5FF;
      font-weight: 700;
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
    }

    .colony-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin-top: 2px;
      letter-spacing: 0.3px;
    }

    .dome-progress {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.75);
      margin-top: 8px;
      font-weight: 500;
    }

    .dome-bar {
      width: 150px;
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      margin-top: 5px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .dome-fill {
      height: 100%;
      background: linear-gradient(90deg, #00FF87 0%, #00D2FF 100%);
      box-shadow: 0 0 10px rgba(0, 255, 135, 0.6);
      border-radius: 6px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .credits-card {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #00E5FF;
      text-shadow: 0 0 12px rgba(0, 229, 255, 0.3);
      padding: 12px 18px;
    }

    /* Bay status (top-center) */
    .bays-status {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      background: rgba(14, 8, 28, 0.72);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 100px;
      padding: 8px 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .bay-dot {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 2px dashed rgba(255, 255, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .bay-dot.loaded {
      background: rgba(0, 255, 135, 0.18);
      border: 2px solid #00FF87;
      color: #00FF87;
      text-shadow: 0 0 8px rgba(0, 255, 135, 0.8);
      box-shadow: 0 0 18px rgba(0, 255, 135, 0.45);
      transform: scale(1.08);
    }

    /* Hint text (bottom center) */
    .hint {
      position: absolute;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(14, 8, 28, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 107, 53, 0.4);
      border-radius: 100px;
      padding: 12px 24px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      max-width: 90vw;
      box-shadow: 0 10px 30px rgba(255, 107, 53, 0.15);
      animation: fadeSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translate(-50%, 16px);
      }

      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    /* Status bar */
    .status-bar {
      position: absolute;
      bottom: 110px;
      left: 16px;
      right: 16px;
      background: rgba(14, 8, 28, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 229, 255, 0.3);
      border-radius: 18px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 13px;
      font-weight: 500;
      max-width: 400px;
      margin: 0 auto;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      z-index: 100;
    }

    .status-icon {
      font-size: 26px;
    }

    .status-info {
      flex: 1;
    }

    .status-progress {
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 6px;
    }

    .status-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00D2FF 0%, #0066FF 100%);
      box-shadow: 0 0 8px rgba(0, 210, 255, 0.5);
      transition: width 0.4s linear;
    }

    /* Launch Button (Epic) */
    .launch-btn {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #FF6B35 0%, #FF2E93 100%);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 18px 48px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1.5px;
      cursor: pointer;
      box-shadow: 0 12px 40px rgba(255, 46, 147, 0.55), inset 0 2px 0 rgba(255, 255, 255, 0.2);
      text-transform: uppercase;
      animation: pulseBtn 2s infinite;
      display: none;
      pointer-events: auto;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      z-index: 50;
      min-height: 60px;
      min-width: 220px;
    }

    @keyframes pulseBtn {

      0%,
      100% {
        box-shadow: 0 12px 40px rgba(255, 46, 147, 0.45);
        transform: translateX(-50%) scale(1);
      }

      50% {
        box-shadow: 0 12px 60px rgba(255, 46, 147, 0.8);
        transform: translateX(-50%) scale(1.03);
      }
    }

    .launch-btn:active {
      transform: translateX(-50%) scale(0.95) !important;
    }

    /* Modal Background */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(4, 2, 8, 0.7);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      animation: bgFade 0.25s ease-out;
      -webkit-overflow-scrolling: touch;
    }

    @keyframes bgFade {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* Premium modal */
    .modal {
      width: 100%;
      max-width: 440px;
      background: linear-gradient(180deg, #150c26 0%, #06020c 100%);
      border-radius: 28px 28px 0 0;
      padding: 16px 24px 32px;
      border: 1px solid rgba(255, 255, 255, 0.14) !important;
      border-bottom: none !important;
      box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(120, 50, 255, 0.25) !important;
      animation: modalSlide 0.35s cubic-bezier(0.1, 0.8, 0.25, 1);
      max-height: 92vh;
      overflow-y: auto;
    }

    @media (min-width: 500px) {
      .modal-bg {
        align-items: center;
      }

      .modal {
        border-radius: 24px;
        max-width: 440px;
        margin: 0 16px;
        border: 1px solid rgba(255, 255, 255, 0.14) !important;
      }
    }

    @keyframes modalSlide {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    .modal-handle {
      width: 48px;
      height: 5px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 3px;
      margin: 0 auto 16px;
    }

    .modal-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    .modal-subtitle {
      font-size: 13.5px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 18px;
      line-height: 1.5;
    }

    /* Resource row */
    .resource-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 16px;
      margin-bottom: 18px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .r-icon {
      font-size: 42px;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.1));
    }

    .r-info {
      flex: 1;
    }

    .r-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
    }

    .r-stock {
      font-size: 12.5px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 4px;
    }

    .have {
      color: #00FF87;
      font-weight: 700;
    }

    .lack {
      color: #FF4D6D;
      font-weight: 700;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.15s, background 0.15s, box-shadow 0.15s !important;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:active {
      transform: scale(0.94) !important;
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, #FF6B35 0%, #FF2E93 100%);
      color: white;
      box-shadow: 0 6px 20px rgba(255, 46, 147, 0.35);
    }

    .btn-primary:not(:disabled):hover {
      box-shadow: 0 8px 25px rgba(255, 46, 147, 0.5);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.07);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .btn-credit {
      background: linear-gradient(135deg, #00D2FF 0%, #0066FF 100%);
      color: white;
      box-shadow: 0 6px 20px rgba(0, 210, 255, 0.3);
    }

    .btn-ghost {
      background: transparent;
      color: rgba(255, 255, 255, 0.5);
    }

    .btn-ghost:hover {
      color: rgba(255, 255, 255, 0.8);
    }

    /* Interactive Radar calibration (Navigation Alignment) */
    .radar-container {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 2px solid rgba(0, 229, 255, 0.25);
      position: relative;
      margin: 16px auto;
      background: radial-gradient(circle, rgba(0, 229, 255, 0.05) 0%, rgba(0, 0, 0, 0) 70%);
      overflow: hidden;
      box-shadow: 0 0 24px rgba(0, 229, 255, 0.15);
    }

    .radar-grid {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background-image:
        radial-gradient(circle, transparent 30%, rgba(0, 229, 255, 0.1) 31%, transparent 32%, transparent 60%, rgba(0, 229, 255, 0.1) 61%, transparent 62%),
        linear-gradient(to right, transparent 49.5%, rgba(0, 229, 255, 0.15) 50%, transparent 50.5%),
        linear-gradient(to bottom, transparent 49.5%, rgba(0, 229, 255, 0.15) 50%, transparent 50.5%);
    }

    .radar-sweep {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 150px;
      height: 150px;
      background: conic-gradient(from 0deg, rgba(0, 229, 255, 0.3) 0deg, transparent 90deg);
      transform-origin: 0 0;
      transform: translate(-50%, -50%) rotate(0deg);
      animation: radarSweep 3s linear infinite;
      pointer-events: none;
      border-radius: 50%;
    }

    @keyframes radarSweep {
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    .radar-target {
      position: absolute;
      width: 28px;
      height: 28px;
      border: 2px dashed #00FF87;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px rgba(0, 255, 135, 0.4);
      pointer-events: none;
    }

    .radar-indicator {
      position: absolute;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 16px white;
      transition: transform 0.08s linear;
    }

    .radar-hud-info {
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #00E5FF;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    /* Reactor stabilization sweep (Precision timing game) */
    .reactor-container {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.06);
      position: relative;
      margin: 20px auto;
      background: rgba(0, 0, 0, 0.3);
      box-shadow: 0 0 30px rgba(120, 50, 255, 0.1);
    }

    .reactor-target-sector {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 144deg, transparent 0deg, rgba(0, 255, 135, 0.25) 0deg, rgba(0, 255, 135, 0.25) 72deg, transparent 72deg);
      border: 4px solid transparent;
      pointer-events: none;
    }

    .reactor-target-line {
      position: absolute;
      top: 0;
      left: 50%;
      width: 4px;
      height: 50%;
      background: #00FF87;
      transform-origin: 50% 100%;
      transform: translateX(-50%) rotate(180deg);
      box-shadow: 0 0 10px #00FF87;
    }

    .reactor-needle {
      position: absolute;
      top: 0;
      left: 50%;
      width: 4px;
      height: 50%;
      background: #FF2E93;
      transform-origin: 50% 100%;
      transform: translateX(-50%) rotate(0deg);
      box-shadow: 0 0 12px #FF2E93;
      z-index: 10;
    }

    .reactor-center {
      position: absolute;
      width: 24px;
      height: 24px;
      background: #150c26;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
    }

    /* Obstacles general */
    .obstacle-visual {
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.15));
    }

    .obstacle-visual.bob {
      animation: bob 2s ease-in-out infinite;
    }

    @keyframes bob {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .balance-meter {
      height: 18px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 9px;
      position: relative;
      margin: 20px 0 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .balance-zone {
      position: absolute;
      left: 38%;
      width: 24%;
      height: 100%;
      background: rgba(0, 255, 135, 0.25);
      border-left: 2px solid #00FF87;
      border-right: 2px solid #00FF87;
    }

    .balance-indicator {
      position: absolute;
      top: -3px;
      width: 8px;
      height: 24px;
      background: white;
      border-radius: 4px;
      transition: left 0.08s linear;
      box-shadow: 0 0 16px white;
      transform: translateX(-50%);
    }

    .balance-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
    }

    .balance-controls .btn {
      flex: 1;
      margin-top: 0;
    }

    /* Gyro tilt visual */
    .shuttle-tilt-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 90px;
      perspective: 300px;
      margin-bottom: 4px;
    }

    .shuttle-tilt-icon {
      font-size: 56px;
      display: inline-block;
      transition: transform 0.12s linear;
      transform-style: preserve-3d;
      filter: drop-shadow(0 0 16px rgba(255, 107, 53, 0.5));
    }

    .gyro-hint {
      text-align: center;
      font-size: 12.5px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .gyro-badge {
      display: inline-block;
      background: rgba(0, 255, 135, 0.15);
      border: 1px solid rgba(0, 255, 135, 0.4);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11.5px;
      color: #00FF87;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
      text-shadow: 0 0 6px rgba(0, 255, 135, 0.4);
    }

    .timer-display {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 54px;
      font-weight: 700;
      text-align: center;
      font-variant-numeric: tabular-nums;
      color: #FFB627;
      margin: 12px 0;
      text-shadow: 0 0 24px rgba(255, 182, 39, 0.45);
    }

    .canisters {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 18px 0;
    }

    .canister {
      width: 48px;
      height: 64px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      filter: grayscale(0.8);
    }

    .canister.full {
      background: linear-gradient(180deg, rgba(255, 46, 147, 0.25), rgba(120, 50, 255, 0.45));
      border-color: #FF2E93;
      filter: none;
      box-shadow: 0 0 20px rgba(255, 46, 147, 0.5);
      transform: scale(1.08);
    }

    .center-text {
      text-align: center;
      color: rgba(255, 255, 255, 0.7);
      font-size: 13.5px;
      margin-bottom: 14px;
    }

    .center-text b {
      color: #FFB627;
    }

    /* Rewards */
    .reward-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 20px 0;
    }

    .reward-item {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 16px;
      padding: 16px 8px;
      text-align: center;
      border: 1px solid rgba(255, 182, 39, 0.3);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      animation: rewardPop 0.5s cubic-bezier(.18, 1.85, .7, 1.4) forwards;
    }

    .reward-item:nth-child(2) {
      animation-delay: 0.12s;
      animation-fill-mode: backwards;
    }

    .reward-item:nth-child(3) {
      animation-delay: 0.24s;
      animation-fill-mode: backwards;
    }

    @keyframes rewardPop {
      from {
        opacity: 0;
        transform: scale(0.4) translateY(24px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .reward-icon {
      font-size: 36px;
      filter: drop-shadow(0 0 10px rgba(255, 182, 39, 0.25));
    }

    .reward-amount {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #FFB627;
      margin-top: 6px;
    }

    .reward-name {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.55);
      margin-top: 3px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Toast */
    #toast-wrap {
      position: fixed;
      bottom: 200px;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 2000;
      pointer-events: none;
    }

    .toast {
      background: rgba(14, 8, 28, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 12px 22px;
      border-radius: 100px;
      font-size: 13.5px;
      font-weight: 600;
      animation: toastIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), toastOut 0.3s 2s forwards;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5), 0 0 15px rgba(120, 50, 255, 0.15);
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes toastOut {
      to {
        opacity: 0;
        transform: translateY(-24px);
      }
    }

    .intro-banner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(14, 8, 28, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 107, 53, 0.45);
      border-radius: 24px;
      padding: 24px 28px;
      text-align: center;
      max-width: 380px;
      width: 90%;
      z-index: 20;
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255, 107, 53, 0.15);
    }

    .intro-banner h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      margin-bottom: 10px;
      color: #FFB627;
      letter-spacing: 0.5px;
    }

    .intro-banner p {
      font-size: 13.5px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.78);
      margin-bottom: 16px;
    }

    .intro-banner .btn {
      width: 100%;
      margin-top: 8px;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      background: #06020c;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      color: #FF6B35;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
    }

    .loading-spin {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 107, 53, 0.15);
      border-top-color: #FF6B35;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      margin-bottom: 18px;
      box-shadow: 0 0 15px rgba(255, 107, 53, 0.25);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* CSS Spark particles */
    .spark-particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 2000;
      box-shadow: 0 0 10px currentColor;
      animation: sparkMove 0.6s cubic-bezier(0.1, 0.8, 0.25, 1) forwards;
    }

    @keyframes sparkMove {
      0% {
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0.1) rotate(var(--rot));
        opacity: 0;
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-6px) rotate(-0.5deg);
      }

      40% {
        transform: translateX(5px) rotate(0.5deg);
      }

      60% {
        transform: translateX(-4px) rotate(-0.3deg);
      }

      80% {
        transform: translateX(3px) rotate(0.3deg);
      }
    }

    /* Screen EMP electro-magnetic flash overlay */
    .shield-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle, rgba(120, 50, 255, 0) 40%, rgba(120, 50, 255, 0.15) 100%);
      border: 0px solid rgba(120, 50, 255, 0);
      transition: border-width 0.1s, border-color 0.1s;
      z-index: 5;
      mix-blend-mode: screen;
    }

    .shield-overlay.hit {
      border: 12px solid rgba(180, 80, 255, 0.4);
      background: radial-gradient(circle, rgba(120, 50, 255, 0.1) 20%, rgba(120, 50, 255, 0.45) 100%);
    }

    .inventory-card,
    .hud-card,
    .launch-btn,
    .btn {
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.15s, background 0.15s, box-shadow 0.15s !important;
    }

    .btn:active,
    .launch-btn:active {
      transform: scale(0.92) !important;
    }
  </style>
</head>

<body>

  <div id="loading" class="loading-screen">
    <div class="loading-spin"></div>
    <div>ИНИЦИАЛИЗАЦИЯ КОЛОНИИ...</div>
  </div>

  <div id="canvas-container"></div>
  <div class="shield-overlay" id="shieldOverlay"></div>

  <div class="ui-overlay">
    <div class="hud-top">
      <div class="hud-card">
        <div class="colony-name">⛰ Колония</div>
        <div class="colony-title">Аресия-IV</div>
        <div class="dome-progress" id="domeText">🏛 Купол «Гелиос»: 3/10</div>
        <div class="dome-bar">
          <div class="dome-fill" id="domeFill" style="width:30%"></div>
        </div>
      </div>
      <div class="hud-card credits-card">💎 <span id="credits">500</span></div>
    </div>

    <div class="bays-status" id="baysStatus"></div>

    <div id="hint" class="hint" style="display:none;"></div>
    <div id="statusBar" style="display:none;"></div>

    <button class="launch-btn" id="launchBtn" onclick="window._doLaunch()">🚀 Запустить шаттл</button>
  </div>

  <div class="modal-bg" id="modalBg" style="display:none;">
    <div class="modal" id="modal"></div>
  </div>

  <div id="toast-wrap"></div>

  <div class="intro-banner" id="intro">
    <h2>🪐 Шаттл «Арес-7»</h2>
    <p>3 ящика с ресурсами на марсианской поверхности. Нажми на каждый чтобы загрузить. Затем преодолей 3 препятствия и
      запусти шаттл на станцию «Гермес».</p>
    <p style="font-size:11px; color:rgba(255,255,255,0.5); margin-bottom:14px;">Перетащи пальцем/мышью для вращения
      камеры</p>
    <button class="btn btn-primary" onclick="startGame()">Начать</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ============ GAME DATA ============
    const RESOURCES = {
      crystals: { icon: '💎', name: 'Кристаллы', price: 60, color: 0xcc33ff },
      helium3: { icon: '🧪', name: 'Гелий-3', price: 90, color: 0x66ccee },
      phyto: { icon: '🌱', name: 'Фитоконцентрат', price: 70, color: 0x4a9a3a },
      deuterium: { icon: '💧', name: 'Дейтерий', price: 50, color: 0xddddff },
      supercond: { icon: '🧲', name: 'Проводники', price: 80, color: 0x888899 }
    };

    const REWARD_POOL = [
      { id: 'components', icon: '🔧', name: 'Компоненты' },
      { id: 'armor', icon: '🛡️', name: 'Броня' },
      { id: 'meds', icon: '💊', name: 'Медикаменты' },
      { id: 'battery', icon: '🔋', name: 'Батареи' },
      { id: 'panels', icon: '☀️', name: 'Панели' }
    ];

    // ============ SHOWCASE AUDIO SYNTHESIZER ============
    const Sound = {
      ctx: null,
      ambience: null,
      rumble: null,
      init() {
        if (this.ctx) return;
        try {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          console.warn("Web Audio Context not supported", e);
        }
      },
      playTap() {
        this.init();
        if (!this.ctx) return;
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(380, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, this.ctx.currentTime + 0.1);

        gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);

        osc.start();
        osc.stop(this.ctx.currentTime + 0.1);
      },
      playStatic() {
        this.init();
        if (!this.ctx) return;
        if (this.ctx.state === 'suspended') this.ctx.resume();

        const bufferSize = this.ctx.sampleRate * 0.05; // 50ms
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }

        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;

        const filter = this.ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(2000 + Math.random() * 2000, this.ctx.currentTime);
        filter.Q.setValueAtTime(8, this.ctx.currentTime);

        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.18, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);

        noise.start();
      },
      playSuccess() {
        this.init();
        if (!this.ctx) return;
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const notes = [293.66, 349.23, 440.00, 587.33, 698.46, 880.00]; // D4, F4, A4, D5, F5, A5 arpeggio
        notes.forEach((freq, idx) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.connect(gain);
          gain.connect(this.ctx.destination);

          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, this.ctx.currentTime + idx * 0.06);

          gain.gain.setValueAtTime(0, this.ctx.currentTime + idx * 0.06);
          gain.gain.linearRampToValueAtTime(0.1, this.ctx.currentTime + idx * 0.06 + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + idx * 0.06 + 0.3);

          osc.start(this.ctx.currentTime + idx * 0.06);
          osc.stop(this.ctx.currentTime + idx * 0.06 + 0.3);
        });
      },
      playCharge() {
        this.init();
        if (!this.ctx) return;
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.type = 'sine';
        osc.frequency.setValueAtTime(120, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.6);

        gain.gain.setValueAtTime(0.01, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.08, this.ctx.currentTime + 0.4);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.6);

        osc.start();
        osc.stop(this.ctx.currentTime + 0.6);
      },
      playError() {
        this.init();
        if (!this.ctx) return;
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(130, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(90, this.ctx.currentTime + 0.22);

        gain.gain.setValueAtTime(0.18, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.22);

        osc.start();
        osc.stop(this.ctx.currentTime + 0.22);
      },
      playCoilSuccess() {
        this.init();
        if (!this.ctx) return;
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, this.ctx.currentTime + 0.12);

        gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.12);

        osc.start();
        osc.stop(this.ctx.currentTime + 0.12);
      },
      playAmbience() {
        this.init();
        if (!this.ctx) return;
        if (this.ctx.state === 'suspended') this.ctx.resume();
        if (this.ambience) return;

        const osc1 = this.ctx.createOscillator();
        const osc2 = this.ctx.createOscillator();
        const filter = this.ctx.createBiquadFilter();
        const gain = this.ctx.createGain();

        osc1.type = 'triangle';
        osc1.frequency.setValueAtTime(55, this.ctx.currentTime);

        osc2.type = 'sawtooth';
        osc2.frequency.setValueAtTime(55.3, this.ctx.currentTime);

        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(120, this.ctx.currentTime);

        const lfo = this.ctx.createOscillator();
        const lfoGain = this.ctx.createGain();
        lfo.type = 'sine';
        lfo.frequency.setValueAtTime(0.15, this.ctx.currentTime);
        lfoGain.gain.setValueAtTime(35, this.ctx.currentTime);

        lfo.connect(lfoGain);
        lfoGain.connect(filter.frequency);

        gain.gain.setValueAtTime(0.08, this.ctx.currentTime);

        osc1.connect(filter);
        osc2.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);

        osc1.start();
        osc2.start();
        lfo.start();

        this.ambience = { osc1, osc2, lfo, gain };
      },
      stopAmbience() {
        if (!this.ambience) return;
        try {
          this.ambience.osc1.stop();
          this.ambience.osc2.stop();
          this.ambience.lfo.stop();
        } catch (e) { }
        this.ambience = null;
      },
      playLaunchRumble() {
        this.init();
        if (!this.ctx) return;
        if (this.ctx.state === 'suspended') this.ctx.resume();
        if (this.rumble) return;

        const bufferSize = this.ctx.sampleRate * 2.5;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }

        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        noise.loop = true;

        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(80, this.ctx.currentTime);

        filter.frequency.linearRampToValueAtTime(380, this.ctx.currentTime + 0.5);
        filter.frequency.linearRampToValueAtTime(450, this.ctx.currentTime + 1.5);
        filter.frequency.exponentialRampToValueAtTime(70, this.ctx.currentTime + 4.0);

        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.001, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.28, this.ctx.currentTime + 0.5);
        gain.gain.linearRampToValueAtTime(0.18, this.ctx.currentTime + 2.0);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 4.0);

        const subOsc = this.ctx.createOscillator();
        subOsc.type = 'sine';
        subOsc.frequency.setValueAtTime(38, this.ctx.currentTime);
        subOsc.frequency.linearRampToValueAtTime(48, this.ctx.currentTime + 2.0);

        const subGain = this.ctx.createGain();
        subGain.gain.setValueAtTime(0.001, this.ctx.currentTime);
        subGain.gain.linearRampToValueAtTime(0.35, this.ctx.currentTime + 0.5);
        subGain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 4.0);

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);

        subOsc.connect(subGain);
        subGain.connect(this.ctx.destination);

        noise.start();
        subOsc.start();

        this.rumble = { noise, subOsc, gain, subGain };

        setTimeout(() => {
          this.stopLaunchRumble();
        }, 4500);
      },
      stopLaunchRumble() {
        if (!this.rumble) return;
        try {
          this.rumble.noise.stop();
          this.rumble.subOsc.stop();
        } catch (e) { }
        this.rumble = null;
      }
    }; w

    // Global click/tap hook for satisfying feedback
    document.addEventListener('pointerdown', (e) => {
      const target = e.target;
      if (!target) return;

      if (target.closest('.btn') || target.closest('.resource-card') || target.closest('.inventory-item') || target.closest('.launch-btn') || target.closest('.canister')) {
        if (target.closest('#stormTornado') || target.closest('.storm-tapper')) {
          Sound.playStatic();
        } else {
          Sound.playTap();
        }
      }
    });

    let state = {};

    function initState(firstRun = true) {
      state = {
        phase: 'loading',
        credits: firstRun ? 500 : state.credits,
        buildProgress: firstRun ? 3 : state.buildProgress,
        buildTarget: 10,
        inventory: firstRun
          ? { crystals: 4, helium3: 0, phyto: 5, deuterium: 1, supercond: 2 }
          : state.inventory,
        cargoBays: generateBays(firstRun),
        fuel: 1,
        fuelNeeded: 3,
        stormSeconds: 10 + Math.floor(Math.random() * 6),
        flightSeconds: 8
      };
    }

    function generateBays(firstRun) {
      if (firstRun) {
        return [
          { resource: 'crystals', amount: 2, loaded: false },
          { resource: 'helium3', amount: 1, loaded: false },
          { resource: 'phyto', amount: 3, loaded: false }
        ];
      }
      const keys = Object.keys(RESOURCES);
      const shuffled = [...keys].sort(() => Math.random() - 0.5).slice(0, 3);
      return shuffled.map(r => ({
        resource: r,
        amount: Math.ceil(Math.random() * 2) + 1,
        loaded: false
      }));
    }

    // ============ 3D SCENE ============
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0612);
    scene.fog = new THREE.Fog(0x3a1408, 22, 70);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // Lighting
    scene.add(new THREE.AmbientLight(0x553344, 0.5));

    const sun = new THREE.DirectionalLight(0xffccaa, 1.3);
    sun.position.set(8, 15, 6);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -15;
    sun.shadow.camera.right = 15;
    sun.shadow.camera.top = 15;
    sun.shadow.camera.bottom = -15;
    scene.add(sun);

    const fillLight = new THREE.DirectionalLight(0xff5533, 0.4);
    fillLight.position.set(-6, 3, -4);
    scene.add(fillLight);

    scene.add(new THREE.HemisphereLight(0xff8866, 0x331122, 0.3));

    // Mars sky gradient
    const skyGeo = new THREE.SphereGeometry(80, 32, 16);
    const skyMat = new THREE.ShaderMaterial({
      uniforms: {
        topColor: { value: new THREE.Color(0x0a0612) },
        midColor: { value: new THREE.Color(0x3a1830) },
        bottomColor: { value: new THREE.Color(0x8a3818) }
      },
      vertexShader: `
    varying vec3 vWorldPosition;
    void main() {
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vWorldPosition = worldPos.xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
      fragmentShader: `
    uniform vec3 topColor;
    uniform vec3 midColor;
    uniform vec3 bottomColor;
    varying vec3 vWorldPosition;
    void main() {
      float h = normalize(vWorldPosition).y;
      vec3 col;
      if (h > 0.0) {
        col = mix(midColor, topColor, pow(h, 0.5));
      } else {
        col = mix(midColor, bottomColor, pow(-h, 0.7));
      }
      gl_FragColor = vec4(col, 1.0);
    }
  `,
      side: THREE.BackSide
    });
    scene.add(new THREE.Mesh(skyGeo, skyMat));

    // Stars
    const starGeo = new THREE.BufferGeometry();
    const starCount = 1200;
    const starPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      const r = 60;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(Math.random() * 0.9 + 0.05);
      starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      starPos[i * 3 + 1] = r * Math.cos(phi);
      starPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
      color: 0xffffff, size: 0.15, transparent: true, opacity: 0.85
    }));
    scene.add(stars);

    // Mars ground (with noise)
    const groundGeo = new THREE.PlaneGeometry(120, 120, 50, 50);
    const positions = groundGeo.attributes.position.array;
    for (let i = 0; i < positions.length; i += 3) {
      const x = positions[i];
      const y = positions[i + 1];
      const dist = Math.sqrt(x * x + y * y);
      // Keep launch pad area flat, add noise outside
      const noise = (Math.random() - 0.5) * 0.6 + Math.sin(x * 0.3) * Math.cos(y * 0.3) * 0.4;
      positions[i + 2] = dist > 5 ? noise : 0;
    }
    groundGeo.computeVertexNormals();
    const ground = new THREE.Mesh(groundGeo, new THREE.MeshStandardMaterial({
      color: 0xb24628, roughness: 0.95, metalness: 0.05, flatShading: true
    }));
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Distant hills
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2 + Math.random() * 0.3;
      const dist = 28 + Math.random() * 15;
      const scale = 3 + Math.random() * 5;
      const hillGeo = new THREE.SphereGeometry(scale, 10, 6, 0, Math.PI * 2, 0, Math.PI / 2);
      const hill = new THREE.Mesh(hillGeo, new THREE.MeshStandardMaterial({
        color: 0x6a2a14, roughness: 1, flatShading: true
      }));
      hill.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
      hill.scale.y = 0.4 + Math.random() * 0.3;
      scene.add(hill);
    }

    // Rocks
    for (let i = 0; i < 22; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 6 + Math.random() * 14;
      const scale = 0.18 + Math.random() * 0.5;
      const rockGeo = new THREE.DodecahedronGeometry(scale, 0);
      const rock = new THREE.Mesh(rockGeo, new THREE.MeshStandardMaterial({
        color: 0x5a2410, roughness: 1, flatShading: true

    function spawnStormArc() {
      const start = new THREE.Vector3(
        (Math.random() - 0.5) * 4,
        1 + Math.random() * 3,
        (Math.random() - 0.5) * 4
      );
      const end = new THREE.Vector3(
        rocketGroup.position.x + (Math.random() - 0.5) * 0.5,
        rocketGroup.position.y + 1 + Math.random() * 2,
        rocketGroup.position.z + (Math.random() - 0.5) * 0.5
      );

      const points = [];
      const segments = 5;
      for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        const pt = new THREE.Vector3().lerpVectors(start, end, t);
        if (i > 0 && i < segments) {
          pt.x += (Math.random() - 0.5) * 0.25;
          pt.y += (Math.random() - 0.5) * 0.25;
          pt.z += (Math.random() - 0.5) * 0.25;
        }
        points.push(pt);
      }

      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({ color: 0xa858ff, transparent: true, opacity: 0.95 });
      const line = new THREE.Line(geo, mat);
      line.userData = { life: 1.0, decay: 0.15 + Math.random() * 0.1 };
      stormArcs.add(line);
    }

        line.material.opacity = line.userData.life;

    }

    // ============ CAMERA CONTROL ============
    let camAngle = -Math.PI / 2 + 0.5;
    let camHeight = 3.5;
    let camDist = 11;

    function updateCamera() {
      CameraShake.update(0.016);
      camera.position.x = Math.cos(camAngle) * camDist + CameraShake.offset.x;
      camera.position.z = Math.sin(camAngle) * camDist + CameraShake.offset.z;
      camera.position.y = camHeight + CameraShake.offset.y;
      camera.lookAt(0, 2.5 + CameraShake.offset.y * 0.5, 0);
    }

    let pointerDown = null;
    let pointerMoved = false;
    let lastPointer = null;

    function getPointerPos(e) {
      if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    }

    renderer.domElement.addEventListener('pointerdown', e => {
      pointerDown = getPointerPos(e);
      lastPointer = pointerDown;
      pointerMoved = false;
    });

    renderer.domElement.addEventListener('pointermove', e => {
      const p = getPointerPos(e);
      if (pointerDown && lastPointer) {
        const totalDx = p.x - pointerDown.x;
        const totalDy = p.y - pointerDown.y;
        if (Math.abs(totalDx) > 5 || Math.abs(totalDy) > 5) {
          pointerMoved = true;
          const dx = p.x - lastPointer.x;
          const dy = p.y - lastPointer.y;
          camAngle -= dx * 0.006;
          camHeight = Math.max(2, Math.min(8, camHeight + dy * 0.02));
          updateCamera();
          lastPointer = p;
        }
      }
    });

    renderer.domElement.addEventListener('pointerup', e => {
      const p = getPointerPos(e);
      if (pointerDown && !pointerMoved) {
        handleTap(p.x, p.y);
      }
      pointerDown = null;
      lastPointer = null;
    });

    renderer.domElement.addEventListener('pointercancel', () => {
      pointerDown = null; lastPointer = null;
    });

    // Raycaster
    const raycaster = new THREE.Raycaster();
    const mouseVec = new THREE.Vector2();

    function handleTap(x, y) {
      if (state.phase !== 'loading') return;
      mouseVec.x = (x / window.innerWidth) * 2 - 1;
      mouseVec.y = -(y / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouseVec, camera);
      const intersects = raycaster.intersectObjects(cargoMeshes.filter(m => m.visible), true);
      if (intersects.length > 0) {
        // Find parent group
        let obj = intersects[0].object;
        while (obj && obj.userData.index === undefined) obj = obj.parent;
        if (obj) openBayModal(obj.userData.index);
      }
    }

    // ============ ANIMATION LOOP ============
    let clock = new THREE.Clock();
    let elapsed = 0;
    let launchTime = 0;
    let returnTime = 0;
    let cameraAuto = true;

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      elapsed += dt;

      // Rotate radar dish
      if (radarGroup) radarGroup.rotation.y += dt * 0.8;

      // Update particles
      updateSmoke();
      updateThrusterParticles();
      updateLoadParticles();
      updateStormArcs();

      // Slow auto-rotation when idle
      if (cameraAuto && state.phase === 'loading') {
        camAngle += dt * 0.05;
      }

      // Camera shake & position update every frame
      updateCamera();

      // Cargo bobbing and rotation
      cargoMeshes.forEach((m, i) => {
        if (m.visible) {
          m.position.y = m.userData.baseY + Math.sin(elapsed * 2 + i * 1.5) * 0.06;
          m.rotation.y += dt * 0.3;
        }
      });

      // Star slow drift
      stars.rotation.y += dt * 0.005;

      // Flame flicker
      if (flame.material.opacity > 0.01) {
        flame.scale.y = 1 + Math.sin(elapsed * 35) * 0.08;
        flame.scale.x = 1 + Math.sin(elapsed * 40 + 1) * 0.06;
        flame.scale.z = flame.scale.x;
        innerFlame.scale.y = 1 + Math.cos(elapsed * 38) * 0.08;
      }

      // Launch sequence
      if (state.phase === 'launchAnim') {
        launchTime += dt;
        const p = Math.min(launchTime / 4, 1);

        // Build up phase (0-0.5s): flame ignites, light shakes
        if (launchTime < 0.5) {
          const buildP = launchTime / 0.5;
          flame.material.opacity = buildP;
          innerFlame.material.opacity = buildP;
          engineLight.intensity = buildP * 3;
          rocketGroup.position.x = (Math.random() - 0.5) * 0.04;
          rocketGroup.position.z = (Math.random() - 0.5) * 0.04;
          spawnSmoke();
          spawnSmoke();
          spawnThrusterParticles();
          CameraShake.shake(0.15);
        } else {
          const ascentP = (launchTime - 0.5) / 3.5;
          const ease = Math.pow(ascentP, 2.2);
          rocketGroup.position.y = 0.4 + ease * 60;
          flame.material.opacity = 1;
          innerFlame.material.opacity = 1;
          flame.scale.y = 1 + ease * 1.5;
          engineLight.intensity = 3;

          spawnThrusterParticles();
          if (ascentP < 0.5) spawnSmoke();
          CameraShake.shake(0.04);

          // Camera tilts up
          camHeight = 3.5 + ease * 4;
        }

        if (launchTime >= 4) {
          state.phase = 'flying';
          rocketGroup.visible = false;
          flame.material.opacity = 0;
          innerFlame.material.opacity = 0;
          engineLight.intensity = 0;
          cameraAuto = false;
          startFlightTimer();
        }
      }

      // Camera return after launch
      if (state.phase === 'flying') {
        camHeight += (3.5 - camHeight) * 0.03;
      }

      // Return sequence
      if (state.phase === 'returnAnim') {
        returnTime += dt;
        const p = Math.min(returnTime / 3, 1);
        rocketGroup.visible = true;
        rocketGroup.position.y = 0.4 + (1 - p) * 50;
        flame.material.opacity = (1 - p) * 0.5;
        innerFlame.material.opacity = (1 - p) * 0.6;
        engineLight.intensity = (1 - p) * 2;
        if (p < 0.8) spawnSmoke();
        CameraShake.shake(0.02);

        if (returnTime >= 3) {
          state.phase = 'claim';
          rocketGroup.position.y = 0.4;
          flame.material.opacity = 0;
          innerFlame.material.opacity = 0;
          engineLight.intensity = 0;
          returnTime = 0;
          showClaimModal();
        }
      }

      // Storm lightning flash in 3D
      if (state.phase === 'storm') {
        if (Math.random() < 0.06) {
          spawnStormArc();
          CameraShake.shake(0.08);
          const sunOrig = sun.intensity;
          sun.intensity = 2.5;
          setTimeout(() => { sun.intensity = sunOrig; }, 40);
        }
      }

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ============ UI ============

    function updateUI() {
      document.getElementById('credits').textContent = state.credits;
      document.getElementById('domeText').textContent = `🏛 Купол «Гелиос»: ${state.buildProgress}/${state.buildTarget}`;

    function renderBaysStatus() {

      state.cargoBays.forEach((bay) => {
        const res = RESOURCES[bay.resource];

        el.appendChild(dot);
      });

    function renderLaunchBtn() {
      const btn = document.getElementById('launchBtn');
      if (state.phase !== 'loading') { btn.style.display = 'none'; return; }
      const all = state.cargoBays.every(b => b.loaded);
      btn.style.display = all ? 'block' : 'none';
    }

    window._doLaunch = function () {
      try {
        if (state.phase === 'loading' && state.cargoBays.every(b => b.loaded)) {
          startPreLaunch();
        } else {
          toast('⚠️ phase:' + state.phase + ' loaded:' + state.cargoBays.filter(b => b.loaded).length + '/3');
        }
      } catch (err) {
        toast('❌ ' + err.message);
        console.error(err);
      }
    };


    function showHint(text, duration = 3000) {
      const el = document.getElementById('hint');
      el.textContent = text;
      el.style.display = 'block';
      if (showHint._t) clearTimeout(showHint._t);
      showHint._t = setTimeout(() => { el.style.display = 'none'; }, duration);
    }

    function showStatusBar(icon, text, pct) {

      el.style.display = 'flex';
      el.className = 'status-bar';
      el.innerHTML = `
    <div class="status-icon">${icon}</div>
    <div class="status-info">
      <div>${text}</div>
      <div class="status-progress"><div class="status-progress-fill" style="width:${pct}%"></div></div>
    </div>
  `;

    function clearStatusBar() {

    }

    function toast(msg) {

      const t = document.createElement('div');

      wrap.appendChild(t);

      document.getElementById('modal').innerHTML = '<div class="modal-handle"></div>' + html;
